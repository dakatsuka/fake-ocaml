name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: OCaml ${{ matrix.ocaml-compiler }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ocaml-compiler:
          - 5.0.x
          - 5.4.x
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          dune-cache: true
      - name: Install dependencies
        run: opam install . --deps-only --with-test --with-dev-setup -y
      - name: Build
        run: opam exec -- dune build @all
      - name: Test
        run: opam exec -- dune runtest
      - name: Format check
        run: opam exec -- dune build @fmt
      - name: Static check
        run: opam exec -- dune build @check
      - name: Install check
        run: opam exec -- dune build @install
      - name: opam lint
        run: opam lint fake.opam
